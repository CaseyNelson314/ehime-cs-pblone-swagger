openapi: 3.0.3
info:
  title: 読書管理アプリ API
  description: |
    読書管理アプリのAPI仕様書

    実装方針:
    0. PHPファイル単位でリソースを管理(CGIしばりのため)
    0. HTTPSなし (大学サーバーのため)
    0. 認証はセッションCookieベースで、ログイン成功時にPHPSESSIDが発行される (フロントエンドはこれを自動で送信する前提)
    0. パスパラメータ的なIDはクエリパラメータで表現 (例: /book.php?id=123)
    0. バックエンドは全エンドポイントで、操作対象リソースの所有者チェックを行う
    0. 他人のリソースへのアクセスは404で拒否する (存在を隠すため)
    0. フロントエンドは外部の書籍APIサービスを呼び出さない設計（APIキーの隠蔽、取得結果のキャッシュ、リクエスト回数の制御目的）

    フロントがAPIを呼び出す例を示します。

    ```js
    // 例: 本棚に本を追加する場合
    const response = await fetch("/api/books.php", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        bookshelf_id: 1,         // 追加先の本棚ID
        isbn: "9784873119045",   // 追加する本のISBN
        status: "unread",
        pages_read: 0,
        review: ""
      })
    });
    if (response.ok) {
      const newBook = await response.json();
      console.log("本が追加されました", newBook);
    } else {
      const error = await response.json();
      console.error("エラーが発生しました", error);
    }
    ```
    上記の例では、ユーザーが本棚ID 1にISBN 9784873119045の本を追加しようとしています。リクエストが成功すれば、追加された本の情報がレスポンスとして返されます。エラーが発生した場合は、エラーメッセージが返されます。

  version: 1.0.0
servers:
  - url: https://virtserver.swaggerhub.com/ehime/book-store/1.0.0
    description: SwaggerHub API Auto Mock Server
security:
  - sessionAuth: []
tags:
  - name: auth
    description: 認証
  - name: user
    description: ユーザー
  - name: bookshelf
    description: 本棚
  - name: book
    description: 本
paths:
  /api/auth/register.php:
    post:
      tags:
        - auth
      summary: 新規登録
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
        required: true
      responses:
        "201":
          description: 登録成功 (セッションCookie発行)
          headers:
            Set-Cookie:
              schema:
                type: string
                example: PHPSESSID=abc123; Path=/; HttpOnly
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccess"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
      security: []
  /api/auth/login.php:
    post:
      tags:
        - auth
      summary: ログイン
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          description: ログイン成功 (セッションCookie発行)
          headers:
            Set-Cookie:
              schema:
                type: string
                example: PHPSESSID=abc123; Path=/; HttpOnly
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"
      security: []
  /api/auth/logout.php:
    post:
      tags:
        - auth
      summary: ログアウト
      responses:
        "204":
          description: 成功
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/auth/password.php:
    post:
      tags:
        - auth
      summary: パスワード変更
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordChange"
        required: true
      responses:
        "204":
          description: 成功
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/user.php:
    get:
      tags:
        - user
      summary: 自分のプロフィール取得
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      tags:
        - user
      summary: プロフィール更新 (名前・メアド)
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
        required: true
      responses:
        "200":
          description: 更新後のユーザー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags:
        - user
      summary: アカウント削除
      description: |
        本棚や本も全て削除される。
      responses:
        "204":
          description: 削除完了
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/bookshelf.php:
    get:
      tags:
        - bookshelf
      summary: 本棚一覧
      responses:
        "200":
          description: 本棚オブジェクト
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bookshelves"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - bookshelf
      summary: 本棚を作成
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookshelfCreate"
        required: true
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bookshelf"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
    patch:
      tags:
        - bookshelf
      summary: 本棚を更新
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookshelfUpdate"
        required: true
      responses:
        "200":
          description: 更新後の本棚
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bookshelf"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags:
        - bookshelf
      summary: 本棚を削除
      description: |
        指定された本棚を削除する。中の本も削除される。
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: 削除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/books-global.php:
    get:
      tags:
        - book
      summary: タイトルから本の候補を検索 (本の初回登録用)
      description: |
        バックエンドに本を登録するには ISBN が必須であるが、ユーザーに ISBN を指定してもらうのは酷なため、タイトルから本の候補を検索する機能を提供する。

        つまり本の登録を行う際、フロントは次のような手順を踏む。

        1. ユーザーがタイトルを入力して検索
        2. フロントエンドがこのエンドポイントにリクエストを送り、タイトルにマッチする本の候補を取得
        3. ユーザーが候補の中から正しい本を選択
        4. 選択された本のISBNを使って /books.php に本の追加リクエストを送る

        一覧表示に使用する書影ファイルはサーバーが持つが、当エンドポイント呼び出しで得られる書影URLは Google Books APIなどの外部サービスのものを返す。一時的な表示であり、サーバーにキャッシュする意味がないため。

      parameters:
        - name: title
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 本の配列
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Books"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/books.php:
    get:
      tags:
        - book
      summary: 本の一覧を取得
      description: |
        指定された本棚内の本を一覧取得する。

        本棚一覧を表示する場合、フロントは次のような手順を踏む。
        1. /bookshelf.php からユーザーの本棚一覧を取得
        2. 各本棚に対して当エンドポイントにリクエストを送る
        3. 各本棚内の本の一覧を取得し、ユーザーに表示する

        なお、当エンドポイントのレスポンスには各本の詳細情報（タイトル、著者、書影URLなど）も含まれるため、フロントエンドは /books-global.php を呼び出す必要はない。
      parameters:
        - name: bookshelf_id
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 本の配列
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserBooks"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags:
        - book
      summary: 本を追加
      description: |
        本棚に本を追加する。
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookCreate"
        required: true
      responses:
        "201":
          description: 追加成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserBook"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/book.php:
    get:
      tags:
        - book
      summary: 単一の本の詳細取得
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 本オブジェクト
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserBook"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - book
      summary: 本の情報更新
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookUpdate"
        required: true
      responses:
        "200":
          description: 更新後の本
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserBook"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags:
        - book
      summary: 本を削除
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: 削除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

# スキーマ定義

components:
  schemas:
    Error:
      required:
        - code
        - message
      type: object
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: 入力値が不正です
    RegisterRequest:
      required:
        - email
        - name
        - password
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          minLength: 8
          type: string
          writeOnly: true
    LoginRequest:
      required:
        - email
        - password
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
    AuthSuccess:
      type: object
      properties:
        user_id:
          type: integer
        name:
          type: string
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
        email:
          type: string
          format: email
        created_at:
          type: string
          format: date-time
          readOnly: true
    UserUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
    PasswordChange:
      required:
        - current_password
        - new_password
      type: object
      properties:
        current_password:
          type: string
          writeOnly: true
        new_password:
          type: string
          minLength: 8
          writeOnly: true
    Bookshelf:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user_id:
          type: integer
          readOnly: true
        name:
          type: string
        book_count:
          type: integer
          readOnly: true
    Bookshelves:
      type: array
      items:
        $ref: "#/components/schemas/Bookshelf"
    BookshelfCreate:
      required:
        - name
      type: object
      properties:
        name:
          type: string
    BookshelfUpdate:
      type: object
      properties:
        name:
          type: string
    BookStatus:
      type: string
      enum:
        - unread
        - reading
        - finished

    # 各ユーザーの持つ本のスキーマ
    UserBook:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        bookshelf_id:
          type: integer
        details:
          $ref: "#/components/schemas/Book"
        status:
          $ref: "#/components/schemas/BookStatus"
        reading_time_seconds:
          minimum: 0
          type: integer
        pages_read:
          minimum: 0
          type: integer
        review:
          type: string
        added_at:
          type: string
          format: date-time
          readOnly: true
    UserBooks:
      type: array
      items:
        $ref: "#/components/schemas/UserBook"

    # タイトルから本の候補を検索した結果のスキーマ
    Book:
      type: object
      properties:
        isbn:
          type: string
          example: "9784873119045"
        title:
          type: string
        author:
          type: string
        image_url:
          type: string
          format: uri

    Books:
      type: array
      items:
        $ref: "#/components/schemas/Book"

    BookCreate:
      required:
        - bookshelf_id
        - isbn
      type: object
      properties:
        bookshelf_id:
          type: integer
        isbn:
          type: string
        status:
          $ref: "#/components/schemas/BookStatus"
        pages_read:
          type: integer
          default: 0
        review:
          type: string
    BookUpdate:
      type: object
      properties:
        bookshelf_id:
          type: integer
        status:
          $ref: "#/components/schemas/BookStatus"
        reading_time_seconds:
          type: integer
        pages_read:
          type: integer
        review:
          type: string
  responses:
    Unauthorized:
      description: 未認証 (セッションなし or 期限切れ)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: リソースが存在しない
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ValidationError:
      description: バリデーションエラー
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: 重複等の競合
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  securitySchemes:
    sessionAuth:
      type: apiKey
      description: PHPが発行するPHPSESSIDを使用して認証する。
      name: PHPSESSID
      in: cookie
